<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Naveen Nazaria profile banner</title>
  <desc id="desc">A visual banner for Naveen Nazaria with the line Perspective to Practice to Public Value.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.48" stop-color="#102A43"/>
      <stop offset="1" stop-color="#0B3B35"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(920 90) rotate(145) scale(420 270)">
      <stop stop-color="#38BDF8" stop-opacity="0.48"/>
      <stop offset="0.55" stop-color="#14B8A6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#07111F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lens" x1="705" y1="65" x2="1040" y2="285" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE"/>
      <stop offset="0.45" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#FFFFFF" stroke-opacity="0.06"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="32" fill="url(#grid)"/>
  <rect width="1200" height="360" rx="32" fill="url(#glow)"/>
  <path d="M54 286C175 244 271 253 383 284C502 317 603 308 694 263" stroke="#38BDF8" stroke-opacity="0.32" stroke-width="3"/>
  <path d="M45 310C161 278 277 283 383 314C504 350 613 334 733 290" stroke="#5EEAD4" stroke-opacity="0.26" stroke-width="3"/>
  <g opacity="0.88">
    <path d="M890 98L1012 162L928 236L1078 270" stroke="#5EEAD4" stroke-opacity="0.52" stroke-width="5" stroke-linecap="round"/>
    <path d="M890 98L928 236L794 270" stroke="#38BDF8" stroke-opacity="0.32" stroke-width="4" stroke-linecap="round"/>
    <circle cx="890" cy="98" r="22" fill="#0B1F32" stroke="#A7F3D0" stroke-width="6"/>
    <circle cx="1012" cy="162" r="28" fill="#0B1F32" stroke="#7DD3FC" stroke-width="6"/>
    <circle cx="928" cy="236" r="24" fill="#0B1F32" stroke="#FDE68A" stroke-width="6"/>
    <circle cx="1078" cy="270" r="18" fill="#0B1F32" stroke="#5EEAD4" stroke-width="5"/>
    <circle cx="794" cy="270" r="16" fill="#0B1F32" stroke="#38BDF8" stroke-width="5"/>
  </g>
  <text x="70" y="92" fill="#A7F3D0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="4">NAZARIA</text>
  <text x="70" y="158" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="56" font-weight="800">Naveen Nazaria</text>
  <text x="72" y="204" fill="#D6E4F0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="500">Learn by doing. Build with judgment. Share useful kits.</text>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">
