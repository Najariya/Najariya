    <rect x="252" y="245" width="132" height="44" rx="22" fill="#CCFBF1" fill-opacity="0.12" stroke="#5EEAD4" stroke-opacity="0.55"/>
    <text x="278" y="273" fill="#CCFBF1">Practice</text>
    <rect x="404" y="245" width="182" height="44" rx="22" fill="#FEF3C7" fill-opacity="0.12" stroke="#FDE68A" stroke-opacity="0.55"/>
